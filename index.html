        const SALT_HEX = "40f981dcaf5623cab775e7e772aef304";
        
        // Decryption and Render Logic
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                // 1. Re-derive Key and IV using PBKDF2 (Must match Python settings)
                const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
                
                // keySize is in 32-bit words. 256 bits = 8 words. 128 bits = 4 words.
                // Total 48 bytes needed (32 Key + 16 IV) = 12 words.
                const keyIv = CryptoJS.PBKDF2(password, salt, {
                    keySize: 12, 
                    iterations: 1000,
                    hasher: CryptoJS.algo.SHA1 // Default in Python's PBKDF2 is SHA1 usually unless specified? 
                    // Wait, Python's Crypto default is usually HMAC-SHA1. Let's ensure match.
                });
                
                // Split Key and IV
                // CryptoJS WordArrays are weird. Let's just grab words.
                const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
                const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
                
                // 2. Decrypt
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });
                
                // 3. Convert to UTF-8 String
                const jsonString = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!jsonString) {
                    throw new Error("Decryption failed (empty result)");
                }
                
                const data = JSON.parse(jsonString);
                
                // Success!
                renderTable(data);
                
                // Hide Login, Show Content
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Incorrect password.";
                document.getElementById('password-input').value = '';
                // Shake effect (optional)
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(5px)';
                setTimeout(() => card.style.transform = 'translateX(0)', 100);
            }
        });

        function renderTable(data) {
            document.getElementById('count-display').textContent = data.count + " Locations Listed";
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            data.mosques.forEach(mosque => {
                const tr = document.createElement('tr');
                
                const tdName = document.createElement('td');
                tdName.textContent = mosque.name;
                
                const tdAddr = document.createElement('td');
                tdAddr.textContent = mosque.address;
                
                tr.appendChild(tdName);
                tr.appendChild(tdAddr);
                tbody.appendChild(tr);
            });
        }

        // Search Logic (Client side, on decrypted data)
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('#table-body tr');

            rows.forEach(row => {
                let text = row.textContent.toLowerCase();
                if (text.includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
