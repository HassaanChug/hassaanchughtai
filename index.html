            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) el.textContent = t[key];
            });
            
            document.getElementById('searchInput').placeholder = t.search_placeholder;
            
            if (mosqueData.length > 0) {
                document.getElementById('count-display').textContent = mosqueData.length + t.count_suffix;
                renderTable(mosqueData);
            }
        }

        function sortData(column) {
            if (currentSort.col === column) {
                currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.col = column;
                currentSort.dir = 'asc';
            }

            // Update Desktop Headers
            document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
            const thKey = 'col_' + column;
            const targetTh = document.querySelector(`th[data-key="${thKey}"]`);
            if (targetTh) targetTh.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');

            // Update Mobile Chips
            document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
            document.getElementById('sort-name-icon').textContent = '⇅';
            document.getElementById('sort-addr-icon').textContent = '⇅';

            const chipId = column === 'name' ? 'sort-name-chip' : 'sort-addr-chip';
            const iconId = column === 'name' ? 'sort-name-icon' : 'sort-addr-icon';
            const arrow = currentSort.dir === 'asc' ? '▲' : '▼';
            
            document.getElementById(chipId).classList.add('active');
            document.getElementById(iconId).textContent = arrow;

            mosqueData.sort((a, b) => {
                const valA = a[column].toLowerCase();
                const valB = b[column].toLowerCase();
                if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable(mosqueData);
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
                const keyIv = CryptoJS.PBKDF2(password, salt, { keySize: 12, iterations: 1000, hasher: CryptoJS.algo.SHA1 });
                const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
                const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
                const jsonString = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!jsonString) throw new Error("Decryption failed");
                
                const data = JSON.parse(jsonString);
                mosqueData = data.mosques;
                changeLanguage('en');
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Incorrect password";
                document.getElementById('password-input').value = '';
            }
        });

        function renderTable(data) {
            const t = TRANSLATIONS[currentLang];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            const filter = document.getElementById('searchInput').value.toLowerCase();
            
            data.forEach(mosque => {
                if (filter && !(mosque.name.toLowerCase().includes(filter) || mosque.address.toLowerCase().includes(filter))) return;

                const tr = document.createElement('tr');
                
                const tdName = document.createElement('td');
                tdName.textContent = mosque.name;
                
                const tdAddr = document.createElement('td');
                tdAddr.textContent = mosque.address;
                
                const tdLink = document.createElement('td');
                const link = document.createElement('a');
                link.href = mosque.link;
                link.target = "_blank";
                link.className = "map-btn";
                link.textContent = t.view_map;
                
                tdLink.appendChild(link);
                tr.appendChild(tdName);
                tr.appendChild(tdAddr);
                tr.appendChild(tdLink);
                tbody.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('keyup', () => renderTable(mosqueData));
    </script>
</body>
</html>
