<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Subtitles</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100vh;
            padding: 40px;
        }
        #subtitles {
            color: white;
            font-size: 64px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div id="subtitles"></div>
    <script>
        const pusher = new Pusher('03365a1d4f34ecebfc91', { cluster: 'eu' });
        const channel = pusher.subscribe('subtitles');
        const box = document.getElementById('subtitles');
        const maxWords = 20;
        let words = [];

        channel.bind('new-text', function(data) {
            const newWords = data.text.split(' ').filter(w => w.trim());
            words = [...words, ...newWords];
            if (words.length > maxWords) {
                words = words.slice(words.length - maxWords);
            }
            box.innerText = words.join(' ');
        });
    </script>
</body>
</html>
