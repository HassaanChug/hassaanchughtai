                        <div class="prayer-time-item"><div class="prayer-name">Asr</div><div class="prayer-time">${m.times.asr||'--'}</div></div>
                        <div class="prayer-time-item"><div class="prayer-name">Maghrib</div><div class="prayer-time">${m.times.maghrib||'--'}</div></div>
                        <div class="prayer-time-item"><div class="prayer-name">Isha</div><div class="prayer-time">${m.times.isha||'--'}</div></div>
                        <div class="prayer-time-item"><div class="prayer-name">Jummah</div><div class="prayer-time">${m.times.jummah||'--'}</div></div>
                    </div>
                `;
            }
            card.innerHTML = `<div class="card-top"><div class="card-content"><div class="card-title">${m.name}</div><div class="card-address">${m.address}</div><div class="card-postcode">${m.postcode||''}</div></div><div class="card-action"><a href="${m.link}" target="_blank" class="btn-locate">&#10148;</a></div></div>${timesHtml}`;
            list.appendChild(card);
        });
    }
    function applySort(type) {
        activeFilter = {type:null,value:null}; updateChips(type==='name'?'filter-az':'filter-nearby');
        if(type==='name') { mosqueData.sort((a,b)=>a.name.localeCompare(b.name)); renderList(mosqueData); }
        else { if(userLat) doGeoSort(); else navigator.geolocation.getCurrentPosition(p=>{ userLat=p.coords.latitude; userLon=p.coords.longitude; doGeoSort(); }, ()=>alert(TRANSLATIONS[currentLang].geo_err)); }
    }
    function doGeoSort() { mosqueData.sort((a,b)=>getDist(userLat,userLon,a.lat,a.lon)-getDist(userLat,userLon,b.lat,b.lon)); renderList(mosqueData); }
    function openBottomSheet(type) {
        const sheet=document.getElementById('bottom-sheet'), content=document.getElementById('sheet-content');
        content.innerHTML = ''; document.getElementById('sheet-title').textContent = type==='area' ? TRANSLATIONS[currentLang].filter_area : TRANSLATIONS[currentLang].filter_post;
        const list = type==='area' ? allAreas : allPostcodes;
        const all = document.createElement('div'); all.className='sheet-item'; all.textContent="All";
        all.onclick=()=>{ activeFilter={type:null,value:null}; closeBottomSheet(); updateChips(null); renderList(mosqueData); };
        content.appendChild(all);
        list.forEach(item=>{
            const div = document.createElement('div'); div.className='sheet-item'; div.textContent=item;
            if(activeFilter.value===item) div.classList.add('active');
            div.onclick=()=>{ activeFilter={type:type,value:item}; closeBottomSheet(); updateChips(type==='area'?'filter-area':'filter-post'); renderList(mosqueData); };
            content.appendChild(div);
        });
        document.getElementById('sheet-overlay').classList.add('open'); sheet.classList.add('open');
    }
    function closeBottomSheet() { document.getElementById('sheet-overlay').classList.remove('open'); document.getElementById('bottom-sheet').classList.remove('open'); }
    function updateChips(id) { document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); if(id) document.getElementById(id).classList.add('active'); }
    document.getElementById('searchInput').addEventListener('keyup', ()=>renderList(mosqueData));
    function startClock() {
        setInterval(()=>document.getElementById('clock-display').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), 1000);
        updateDates();
        fetch('https://api.aladhan.com/v1/timingsByCity?city=Birmingham&country=UK&method=3').then(r=>r.json()).then(d=>{ document.getElementById('sunrise-val').textContent=d.data.timings.Sunrise; document.getElementById('sunset-val').textContent=d.data.timings.Sunset; });
    }
    function updateDates() {
        const now = new Date(); 
        const gregStr = now.toLocaleDateString(currentLang, { weekday:'long', month:'short', day:'numeric' });
        let hijriStr = "";
        try { hijriStr = new Intl.DateTimeFormat(currentLang+'-u-ca-islamic-umalqura', { month:'long', day:'numeric', year:'numeric' }).format(now) + " AH"; } catch(e){}
        document.getElementById('date-display').textContent = gregStr + " | " + hijriStr;
    }
    function getDist(lat1, lon1, lat2, lon2) {
        const R=6371, dLat=(lat2-lat1)*(Math.PI/180), dLon=(lon2-lon1)*(Math.PI/180);
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180)) * Math.sin(dLon/2)*Math.sin(dLon/2);
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
