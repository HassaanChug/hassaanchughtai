<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birmingham Masjid Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div class="controls-bar">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="ur">اردو</option>
            <option value="ar">العربية</option>
            <option value="bn">বাংলা</option>
        </select>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">☀</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 data-key="protected_title">Protected Content</h2>
            <p data-key="login_prompt">Enter password to view directory.</p>
            <form id="login-form">
                <input type="password" id="password-input" class="login-input" placeholder="Password" autofocus required>
                <button type="submit" class="login-btn" data-key="unlock_btn">Unlock</button>
            </form>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="container">
            <header>
                <h1 data-key="page_title">Birmingham Masjid Project</h1>
                
                <div class="datetime-container">
                    <div id="clock-display" class="time-display">--:--:--</div>
                    <div id="greg-date-display" class="date-line">Loading...</div>
                    <div id="hijri-display" class="hijri-line">Loading...</div>
                    <div id="sun-display" class="sun-times">
                        <span class="sun-item" title="Sunrise">🌅 <span id="sunrise-val">--:--</span></span>
                        <span class="sun-item" title="Sunset">🌇 <span id="sunset-val">--:--</span></span>
                    </div>
                </div>
            </header>

            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search by mosque name, area or postcode">
                
                <!-- Search Meta Row -->
                <div class="search-meta-row">
                    <div id="search-helper"></div>
                    <div id="count-display" class="count-badge">Loading...</div>
                </div>
                
                <div class="filter-bar">
                    <div class="chip chip-az" onclick="applySort('name')" id="filter-az">
                        <span data-key="filter_az">A-Z</span>
                    </div>
                    
                    <div class="chip chip-area" onclick="openDrawer('area')" id="filter-area">
                        <span data-key="filter_area">By Area</span> ▾
                    </div>
                    
                    <div class="chip chip-post" onclick="openDrawer('postcode')" id="filter-post">
                        <span data-key="filter_post">By Postcode</span> ▾
                    </div>
                    
                    <div class="chip chip-nearby" onclick="applySort('nearby')" id="filter-nearby">
                        📍 <span data-key="filter_nearby">Nearby</span>
                    </div>
                </div>

                <!-- Filter Drawer -->
                <div id="filter-drawer" class="filter-drawer"></div>
            </div>

            <div class="table-wrapper">
                <table id="mosqueTable">
                    <thead>
                        <tr>
                            <th data-key="col_name">Mosque Name</th>
                            <th data-key="col_address">Address</th>
                            <th data-key="col_action">Locate</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            btn.textContent = document.body.classList.contains('dark-mode') ? '🌙' : '☀';
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const t = TRANSLATIONS[lang];
            
            document.body.dir = t.dir;
            document.body.style.fontFamily = t.font;
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) el.textContent = t[key];
            });
            
            document.getElementById('searchInput').placeholder = t.search_placeholder;
            
            if (mosqueData.length > 0) {
                // Update Count Text
                const count = document.querySelectorAll('#table-body tr').length;
                document.getElementById('count-display').textContent = count + t.count_suffix;
            }
            updateDates(); 
        }

        // --- Clock, Dates & Sun ---
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-display').textContent = now.toLocaleTimeString();
            }, 1000);
            updateDates();
            fetchSunTimes();
        }

        function updateDates() {
            const now = new Date();
            const gregOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('greg-date-display').textContent = now.toLocaleDateString(currentLang, gregOpts);

            try {
                const hijriStr = new Intl.DateTimeFormat(currentLang + '-u-ca-islamic-umalqura', {
                    day: 'numeric', month: 'long', year: 'numeric', weekday: 'long'
                }).format(now);
                document.getElementById('hijri-display').textContent = hijriStr;
            } catch (e) {
                document.getElementById('hijri-display').textContent = "";
            }
        }

        function fetchSunTimes() {
            fetch('https://api.aladhan.com/v1/timingsByCity?city=Birmingham&country=UK&method=3')
            .then(res => res.json())
            .then(data => {
                const t = data.data.timings;
                document.getElementById('sunrise-val').textContent = t.Sunrise;
                document.getElementById('sunset-val').textContent = t.Sunset;
            })
            .catch(err => console.error(err));
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
                const keyIv = CryptoJS.PBKDF2(password, salt, { keySize: 12, iterations: 1000, hasher: CryptoJS.algo.SHA1 });
                const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
                const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
                const jsonString = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!jsonString) throw new Error("Decryption failed");
                
                const data = JSON.parse(jsonString);
                mosqueData = data.mosques;
                allAreas = data.areas;
                allPostcodes = data.postcodes;
                
                renderTable(mosqueData); // Initial render
                changeLanguage('en');
                startHelperText();
                startClock();
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Incorrect password";
                document.getElementById('password-input').value = '';
            }
        });

        function startHelperText() {
            const helperEl = document.getElementById('search-helper');
            if (!allAreas.length || !allPostcodes.length) return;
            
            setInterval(() => {
                const t = TRANSLATIONS[currentLang];
                const rArea = allAreas[Math.floor(Math.random() * allAreas.length)];
                const rPost = allPostcodes[Math.floor(Math.random() * allPostcodes.length)];

                setTimeout(() => {
                    helperEl.innerHTML = `${t.helper_try} <b>${rArea}</b> ${t.helper_or} <b>${rPost}</b>`;
                    helperEl.style.opacity = 0.6;
                }, 500);
            }, 4000);
        }

            drawer.appendChild(allBtn);

            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drawer-item';
                div.textContent = item;
                if (activeFilter.type === type && activeFilter.value === item) div.classList.add('active');
                div.onclick = () => { applyFilter(type, item); drawer.classList.remove('show'); openDrawerType = null; };
                drawer.appendChild(div);
            });
            drawer.classList.add('show');
        }

        function applySort(type) {
            activeFilter = { type: null, value: null };
            resetChips();
            document.getElementById('filter-drawer').classList.remove('show');
            if (type === 'name') {
                document.getElementById('filter-az').classList.add('active');
                mosqueData.sort((a, b) => a.name.localeCompare(b.name));
            } 
            else if (type === 'nearby') {
                document.getElementById('filter-nearby').classList.add('active');
                if (userLat && userLon) {
                    mosqueData.sort((a, b) => getDist(userLat, userLon, a.lat, a.lon) - getDist(userLat, userLon, b.lat, b.lon));
                } else { getLoc(); return; }
            }
            renderTable(mosqueData);
        }

        function applyFilter(type, value) {
            resetChips();
            activeFilter = { type: type, value: value };
            if (type === 'area') document.getElementById('filter-area').classList.add('active');
            else if (type === 'postcode') document.getElementById('filter-post').classList.add('active');
            renderTable(mosqueData);
        }

        function resetChips() { document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); }

        function getLoc() {
             if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => { userLat = p.coords.latitude; userLon = p.coords.longitude; applySort('nearby'); },
                    () => alert(TRANSLATIONS[currentLang].geo_error)
                );
            } else alert("Geo not supported");
        }
        function getDist(lat1, lon1, lat2, lon2) {
            var R = 6371, dLat = (lat2-lat1)*(Math.PI/180), dLon = (lon2-lon1)*(Math.PI/180);
            var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180)) * Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function renderTable(data) {
            const t = TRANSLATIONS[currentLang];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            let visibleCount = 0;
            
            data.forEach(mosque => {
                const searchableText = (mosque.name + " " + mosque.address + " " + mosque.area + " " + mosque.postcode).toLowerCase();
                if (searchVal && !searchableText.includes(searchVal)) return;
                if (activeFilter.value) {
                    if (activeFilter.type === 'area' && mosque.area !== activeFilter.value) return;
                    if (activeFilter.type === 'postcode' && mosque.postcode !== activeFilter.value) return;
                }
                
                visibleCount++;
                const tr = document.createElement('tr');
                const tdName = document.createElement('td'); tdName.textContent = mosque.name;
                const tdAddr = document.createElement('td'); tdAddr.textContent = mosque.address;
                const tdLink = document.createElement('td');
                const link = document.createElement('a');
                link.href = mosque.link; link.target = "_blank"; link.className = "map-btn"; link.textContent = t.view_map;
                tdLink.appendChild(link);
                tr.appendChild(tdName); tr.appendChild(tdAddr); tr.appendChild(tdLink);
                tbody.appendChild(tr);
            });
            
            document.getElementById('count-display').textContent = visibleCount + t.count_suffix;
        }
        
        document.getElementById('searchInput').addEventListener('keyup', () => renderTable(mosqueData));
    </script>
</body>
</html>
