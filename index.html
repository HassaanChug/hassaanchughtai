    const SALT_HEX = "09aa0b977b93e1ad19160ea9945a367a";

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const pw = document.getElementById('password-input').value;
        try {
            const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
            const keyIv = CryptoJS.PBKDF2(pw, salt, { keySize:12, iterations:1000, hasher:CryptoJS.algo.SHA1 });
            const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
            const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
            const dec = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, { iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7 });
            const str = dec.toString(CryptoJS.enc.Utf8);
            if(!str) throw new Error();
            const data = JSON.parse(str);
            mosqueData = data.mosques; allAreas = data.areas; allPostcodes = data.postcodes;
            changeLanguage('en'); renderList(mosqueData); startClock();
            document.getElementById('login-overlay').style.display='none'; document.getElementById('main-content').style.display='block';
        } catch(err) { document.getElementById('error-msg').textContent = "Incorrect password"; }
    });
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); document.getElementById('theme-icon').innerHTML = document.body.classList.contains('dark-mode') ? '&#127769;' : '&#9728;'; }
    function changeLanguage(code) {
        currentLang = code; const t = TRANSLATIONS[code];
        document.body.dir = t.dir; document.querySelector('.nav-title').textContent = t.title; document.getElementById('searchInput').placeholder = t.search_ph;
        document.getElementById('filter-az').innerHTML = t.filter_az; document.getElementById('filter-area').innerHTML = t.filter_area + ' &#9662;';
        document.getElementById('filter-post').innerHTML = t.filter_post + ' &#9662;'; document.getElementById('filter-nearby').innerHTML = t.filter_nearby + ' &#128205;';
        updateDates(); renderList(mosqueData);
    }
    function renderList(data) {
        const list = document.getElementById('mosque-list'); list.innerHTML = '';
        const filter = document.getElementById('searchInput').value.toLowerCase();
        data.forEach(m => {
            const txt = (m.name+" "+m.address+" "+m.area+" "+m.postcode).toLowerCase();
            if(filter && !txt.includes(filter)) return;
            if(activeFilter.value && ((activeFilter.type==='area' && m.area!==activeFilter.value) || (activeFilter.type==='postcode' && m.postcode!==activeFilter.value))) return;
            const card = document.createElement('div'); card.className = 'mosque-card';
            card.innerHTML = `<div class="card-content"><div class="card-title">${m.name}</div><div class="card-address">${m.address}</div><div class="card-postcode">${m.postcode||''}</div></div><div class="card-action"><a href="${m.link}" target="_blank" class="btn-locate">&#10148;</a></div>`;
            list.appendChild(card);
        });
    }
    function applySort(type) {
        activeFilter = {type:null,value:null}; updateChips(type==='name'?'filter-az':'filter-nearby');
        if(type==='name') { mosqueData.sort((a,b)=>a.name.localeCompare(b.name)); renderList(mosqueData); }
        else {
            if(userLat) doGeoSort();
            else navigator.geolocation.getCurrentPosition(p=>{ userLat=p.coords.latitude; userLon=p.coords.longitude; doGeoSort(); }, ()=>alert(TRANSLATIONS[currentLang].geo_err));
        }
    }
    function doGeoSort() { mosqueData.sort((a,b)=>getDist(userLat,userLon,a.lat,a.lon)-getDist(userLat,userLon,b.lat,b.lon)); renderList(mosqueData); }
    function openBottomSheet(type) {
        const sheet=document.getElementById('bottom-sheet'), content=document.getElementById('sheet-content');
        content.innerHTML = ''; document.getElementById('sheet-title').textContent = type==='area' ? TRANSLATIONS[currentLang].filter_area : TRANSLATIONS[currentLang].filter_post;
        const list = type==='area' ? allAreas : allPostcodes;
        const all = document.createElement('div'); all.className='sheet-item'; all.textContent="All";
        all.onclick=()=>{ activeFilter={type:null,value:null}; closeBottomSheet(); updateChips(null); renderList(mosqueData); };
        content.appendChild(all);
        list.forEach(item=>{
            const div = document.createElement('div'); div.className='sheet-item'; div.textContent=item;
            if(activeFilter.value===item) div.classList.add('active');
            div.onclick=()=>{ activeFilter={type:type,value:item}; closeBottomSheet(); updateChips(type==='area'?'filter-area':'filter-post'); renderList(mosqueData); };
            content.appendChild(div);
        });
        document.getElementById('sheet-overlay').classList.add('open'); sheet.classList.add('open');
    }
    function closeBottomSheet() { document.getElementById('sheet-overlay').classList.remove('open'); document.getElementById('bottom-sheet').classList.remove('open'); }
    function updateChips(id) { document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); if(id) document.getElementById(id).classList.add('active'); }
    document.getElementById('searchInput').addEventListener('keyup', ()=>renderList(mosqueData));
    function startClock() {
        setInterval(()=>document.getElementById('clock-display').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), 1000);
        updateDates();
        fetch('https://api.aladhan.com/v1/timingsByCity?city=Birmingham&country=UK&method=3').then(r=>r.json()).then(d=>{ document.getElementById('sunrise-val').textContent=d.data.timings.Sunrise; document.getElementById('sunset-val').textContent=d.data.timings.Sunset; });
    }
    function updateDates() {
        const now = new Date(); document.getElementById('greg-date-display').textContent=now.toLocaleDateString(currentLang,{weekday:'long',day:'numeric',month:'short'});
        try { document.getElementById('hijri-display').textContent=new Intl.DateTimeFormat(currentLang+'-u-ca-islamic-umalqura',{day:'numeric',month:'long',year:'numeric'}).format(now); } catch(e){}
    }
    function getDist(lat1, lon1, lat2, lon2) {
        const R=6371, dLat=(lat2-lat1)*(Math.PI/180), dLon=(lon2-lon1)*(Math.PI/180);
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180)) * Math.sin(dLon/2)*Math.sin(dLon/2);
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
