    <!-- Controls Bar -->
    <div class="controls-bar">
        <select id="lang-select" onchange="changeLanguage(this.value)" aria-label="Language Selector">
            <option value="en">English</option>
            <option value="ur">اردو</option>
            <option value="ar">العربية</option>
            <option value="bn">বাংলা</option>

        <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle Theme" id="theme-btn">
            ☀

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 data-key="protected_title">Protected Content</h2>
            <p data-key="login_prompt">Enter password to view directory.</p>
            <form id="login-form">
                <input type="password" id="password-input" class="login-input" placeholder="Password" autofocus required>
                <button type="submit" class="login-btn" data-key="unlock_btn">Unlock</button>
            </form>
            <div id="error-msg"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="container">
            <header>
                <h1 data-key="page_title">Birmingham Mosques</h1>
                <div class="summary" id="count-display">Loading...</div>
            </header>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name or area...">
            </div>

            <div class="table-wrapper">
                <table id="mosqueTable">
                    <thead>
                        <tr>
                            <th data-key="col_name" onclick="sortData('name')">Mosque Name</th>
                            <th data-key="col_address" onclick="sortData('address')">Address</th>
                            <th data-key="col_action" class="no-sort">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

                unlock_btn: "আনলক",
                dir: "ltr",
                font: "'Noto Sans Bengali', sans-serif"
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            if (document.body.classList.contains('dark-mode')) {
                btn.textContent = '🌙';
            } else {
                btn.textContent = '☀';
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const t = TRANSLATIONS[lang];
            
            document.body.dir = t.dir;
            document.body.style.fontFamily = t.font;
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) el.textContent = t[key];
            });
            
            document.getElementById('searchInput').placeholder = t.search_placeholder;
            
            const summary = document.getElementById('count-display');
            if (mosqueData.length > 0) {
                summary.textContent = mosqueData.length + t.count_suffix;
            }

            if (mosqueData.length > 0) {
                renderTable(mosqueData);
            }
        }

        // --- Sorting ---
        function sortData(column) {
            // Toggle direction if clicking same column
            if (currentSort.col === column) {
                currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.col = column;
                currentSort.dir = 'asc';
            }

            // Remove icons from all headers
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });

            // Add icon to current header
            // Find th with data-key corresponding to col_columnname
            const thKey = 'col_' + column;
            const targetTh = document.querySelector(`th[data-key="${thKey}"]`);
            if (targetTh) {
                targetTh.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
            }

            // Sort Logic
            mosqueData.sort((a, b) => {
                const valA = a[column].toLowerCase();
                const valB = b[column].toLowerCase();
                if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable(mosqueData);
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
                const keyIv = CryptoJS.PBKDF2(password, salt, { keySize: 12, iterations: 1000, hasher: CryptoJS.algo.SHA1 });
                const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
                const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
                const jsonString = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!jsonString) { throw new Error("Decryption failed"); }
                
                const data = JSON.parse(jsonString);
                mosqueData = data.mosques;
                
                changeLanguage('en');
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Incorrect password.";
                document.getElementById('password-input').value = '';
            }
        });

        function renderTable(data) {
            const t = TRANSLATIONS[currentLang];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Handle filtering locally if search input has value
            const filter = document.getElementById('searchInput').value.toLowerCase();
            
            data.forEach(mosque => {
                // Quick filter check before render (better performance than hiding DOM elements)
                const textMatch = mosque.name.toLowerCase().includes(filter) || mosque.address.toLowerCase().includes(filter);
                if (filter && !textMatch) return;

                const tr = document.createElement('tr');
                
                const tdName = document.createElement('td');
                tdName.textContent = mosque.name;
                tdName.setAttribute('data-label', t.col_name);
                
                const tdAddr = document.createElement('td');
                tdAddr.textContent = mosque.address;
                tdAddr.setAttribute('data-label', t.col_address);
                
                const tdLink = document.createElement('td');
                tdLink.setAttribute('data-label', t.col_action);
                
                const link = document.createElement('a');
                link.href = mosque.link;
                link.target = "_blank";
                link.className = "map-btn";
                link.textContent = t.view_map;
                
                tdLink.appendChild(link);
                tr.appendChild(tdName);
                tr.appendChild(tdAddr);
                tr.appendChild(tdLink);
                tbody.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('keyup', function() {
            renderTable(mosqueData);
        });
    </script>

</body>
</html>
