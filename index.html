                login_prompt: "ডাইরেক্টরি দেখতে আপনার পাসওয়ার্ড লিখুন।",
                unlock_btn: "আনলক",
                dir: "ltr",
                font: "'Noto Sans Bengali', sans-serif"
            }
        };

        let currentLang = 'en';

        // --- Theme Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            if (document.body.classList.contains('dark-mode')) {
                btn.textContent = '🌙';
            } else {
                btn.textContent = '☀';
            }
        }

        // --- Language Logic ---
        function changeLanguage(lang) {
            currentLang = lang;
            const t = TRANSLATIONS[lang];
            
            // Set Direction and Font
            document.body.dir = t.dir;
            document.body.style.fontFamily = t.font;
            
            // Update static text elements
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) el.textContent = t[key];
            });
            
            // Update Placeholder
            document.getElementById('searchInput').placeholder = t.search_placeholder;
            
            // Update Summary if data is loaded
            const summary = document.getElementById('count-display');
            if (mosqueData.length > 0) {
                summary.textContent = mosqueData.length + t.count_suffix;
            }

            // Re-render table to update button text and labels
            if (mosqueData.length > 0) {
                renderTable({'mosques': mosqueData, 'count': mosqueData.length});
            }
        }

        // --- Decryption ---
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const salt = CryptoJS.enc.Hex.parse(SALT_HEX);
                const keyIv = CryptoJS.PBKDF2(password, salt, { keySize: 12, iterations: 1000, hasher: CryptoJS.algo.SHA1 });
                const key = CryptoJS.lib.WordArray.create(keyIv.words.slice(0, 8));
                const iv = CryptoJS.lib.WordArray.create(keyIv.words.slice(8, 12));
                const decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
                const jsonString = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!jsonString) { throw new Error("Decryption failed"); }
                
                const data = JSON.parse(jsonString);
                mosqueData = data.mosques; // Store globally
                
                // Initialize default language
                changeLanguage('en');
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Incorrect password.";
                document.getElementById('password-input').value = '';
            }
        });

        function renderTable(data) {
            const t = TRANSLATIONS[currentLang];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            data.mosques.forEach(mosque => {
                const tr = document.createElement('tr');
                
                const tdName = document.createElement('td');
                tdName.textContent = mosque.name;
                tdName.setAttribute('data-label', t.col_name);
                
                const tdAddr = document.createElement('td');
                tdAddr.textContent = mosque.address;
                tdAddr.setAttribute('data-label', t.col_address);
                
                const tdLink = document.createElement('td');
                tdLink.setAttribute('data-label', t.col_action);
                
                const link = document.createElement('a');
                link.href = mosque.link;
                link.target = "_blank";
                link.className = "map-btn";
                link.textContent = t.view_map;
                
                tdLink.appendChild(link);
                tr.appendChild(tdName);
                tr.appendChild(tdAddr);
                tr.appendChild(tdLink);
                tbody.appendChild(tr);
            });
        }

        // Search Filter
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('#table-body tr');

            rows.forEach(row => {
                let text = row.textContent.toLowerCase();
                if (text.includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
