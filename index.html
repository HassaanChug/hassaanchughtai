<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birmingham Mosques Directory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-container {
            padding: 20px 30px;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #5a67d8;
        }

        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: #2d3748;
            color: white;
            z-index: 10;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f7fafc;
        }

        .map-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .map-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

        .map-btn:active {
            transform: translateY(0);
        }

        .coords {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #4a5568;
        }

        .mosque-name {
            font-weight: 600;
            color: #2d3748;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #718096;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            th, td {
                padding: 10px;
                font-size: 0.9em;
            }

            .table-container {
                max-height: 500px;
            }
        }
    </style>
</head>
<body>

            [-1.893151403, 52.50480035, "Shahjalal (R) Sunnia Mosque & Islamic Community Centre", "108 Ettington Road, Aston, Birmingham, Ladywood, B6 6EB"]
        ];

        const tableBody = document.getElementById('mosqueTableBody');
        const searchInput = document.getElementById('searchInput');

        function renderTable(data) {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="no-results">No mosques found matching your search.</td></tr>';
                return;
            }

            data.forEach(mosque => {
                const row = document.createElement('tr');
                const [lng, lat, name, address] = mosque;
                
                row.innerHTML = `
                    <td class="mosque-name">${name}</td>
                    <td>${address}</td>
                    <td class="coords">${lat.toFixed(6)}</td>
                    <td class="coords">${lng.toFixed(6)}</td>
                    <td>
                        <button class="map-btn" onclick="openMap(${lat}, ${lng})">
                            📍 Directions
                        </button>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        function openMap(lat, lng) {
            const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
            window.open(url, '_blank');
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = mosqueData.filter(mosque => {
                const [lng, lat, name, address] = mosque;
                return name.toLowerCase().includes(searchTerm) || 
                       address.toLowerCase().includes(searchTerm);
            });
            renderTable(filtered);
        });

        renderTable(mosqueData);
    </script>

</html>
